[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
timeout = 600
markers =
    real_llm: 使用真实 LLM API 调用（需要先配置.env 中的 OPENAI_API_KEY）
    slow: 慢速测试（批量测试、性能测试）
    integration: 集成测试
    qcode: QCODE 覆盖测试
    edge_case: 边界情况测试
